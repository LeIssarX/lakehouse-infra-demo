name: OpenTofu Validation

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/tofu-validate.yml'
  push:
    branches:
      - main
    paths:
      - 'infra/**'

# Use OIDC for authentication (no secrets needed)
permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate OpenTofu Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: "1.10.0"
          tofu_wrapper: false

      - name: Check Variable Files Exist
        run: |
          echo "Checking required variable files..."

          if [ ! -f "infra/common.tfvars.example" ]; then
            echo "❌ ERROR: infra/common.tfvars.example not found"
            exit 1
          fi

          if [ ! -f "infra/envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.example" ]; then
            echo "⚠️  WARNING: infra/envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.example not found — using fallback"
          fi

          echo "✅ Variable files check passed"

      - name: OpenTofu Format Check
        id: fmt
        run: tofu fmt -check -recursive infra/
        continue-on-error: true

      - name: OpenTofu Init
        id: init
        working-directory: infra
        run: |
          echo "Initializing OpenTofu without backend (validation only)..."
          tofu init -backend=false

      - name: Create Temporary Variable Files
        working-directory: infra
        run: |
          # Create temporary variable files from examples for validation
          cp common.tfvars.example common.tfvars.tmp

          if [ -f "envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.example" ]; then
            cp envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.example envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.tmp
          else
            # Fallback: create minimal env-specific file
            cat > envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.tmp <<EOF
          environment = "${{ matrix.environment }}"
          subscription_id = "00000000-0000-0000-0000-000000000000"
          resource_group_name = "rg-lakehouse-${{ matrix.environment }}"
          databricks_workspace_name = "dbw-lakehouse-${{ matrix.environment }}"
          catalog_name = "lakehouse_${{ matrix.environment }}"
          storage_account_prefix = "dlh${{ matrix.environment }}"
          enable_vnet_injection = false
          enable_public_access = true
          vnet_name = "vnet-lakehouse-${{ matrix.environment }}"
          vnet_address_space = ["10.0.0.0/16"]
          key_vault_allowed_ips = []
          enable_ip_access_lists = false
          governance_allowed_ips = []
          tags = { "Environment" = "${{ matrix.environment }}" }
          EOF
          fi

      - name: OpenTofu Validate
        id: validate
        working-directory: infra
        run: |
          tofu validate \
            -var-file=common.tfvars.tmp \
            -var-file=envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.tmp \
            -no-color
        continue-on-error: true

      - name: Cleanup Temporary Files
        if: always()
        run: |
          rm -f infra/common.tfvars.tmp
          rm -f "infra/envs/${{ matrix.environment }}/${{ matrix.environment }}.tfvars.tmp"

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fmtStatus    = '${{ steps.fmt.outcome }}'      === 'success' ? '✅' : '❌';
            const initStatus   = '${{ steps.init.outcome }}'     === 'success' ? '✅' : '❌';
            const validateStatus = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';

            const output = `### OpenTofu Validation (${{ matrix.environment }})

            | Check | Status |
            |-------|--------|
            | Format | ${fmtStatus} \`${{ steps.fmt.outcome }}\` |
            | Initialization | ${initStatus} \`${{ steps.init.outcome }}\` |
            | Validation | ${validateStatus} \`${{ steps.validate.outcome }}\` |

            <details><summary>Validation Output</summary>

            \`\`\`
            ${{ steps.validate.outputs.stdout }}
            ${{ steps.validate.outputs.stderr }}
            \`\`\`

            </details>

            **Note:** Validation uses example variable files. Actual deployment values are in the committed \`.tfvars\` files.

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Environment: \`${{ matrix.environment }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "❌ OpenTofu validation failed for ${{ matrix.environment }}"
          exit 1

  security-scan:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true  # Report findings but never block the pipeline

      - name: Comment security findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const output = `### Security Scan (tfsec)

            Security scan completed. Review any findings below or in the Actions log.

            **Note:** Scan runs with \`soft_fail: true\` — findings are reported but do not block merges.
            Review each finding in context before dismissing.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: always()

    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "❌ OpenTofu validation failed"
            exit 1
          fi
          echo "✅ All validation checks passed"
